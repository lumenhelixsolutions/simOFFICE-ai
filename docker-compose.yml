services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8080

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_SIM_BASE_URL=${VITE_SIM_BASE_URL:-}
      - VITE_SIM_MODE=${VITE_SIM_MODE:-compat}
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
